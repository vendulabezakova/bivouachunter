{% load static %}
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BivouacHunter</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="{% static 'spots/css/main.css' %}">
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeFilter()"></div>

    <nav class="navbar">
        <div class="logo">Bivouac<span>Hunter</span></div>
        <div class="nav-center">
            <button class="filter-btn" id="filterBtn" onclick="toggleFilter()">
                🔍 Filtrovat
                <span class="arrow">▾</span>
            </button>
        </div>
        <div class="nav-right">
            {% if user.is_authenticated %}
                <div class="user-badge">
                    <div class="user-avatar">{{ user.email|slice:":1"|upper }}</div>
                    <span class="user-email">{{ user.email }}</span>
                </div>
                <a href="{% url 'custom_logout' %}" class="btn-login">Odhlásit</a>
            {% else %}
                <a href="{% url 'account_login' %}" class="btn-login">Přihlásit</a>
                <a href="{% url 'account_signup' %}" class="btn-register">Registrovat</a>
            {% endif %}
        </div>
    </nav>

    <div class="filter-dropdown" id="filterDropdown">
        <div class="filter-grid">
            <div class="filter-group">
                <label>Orientace svahu</label>
                <select id="f-orientation">
                    <option value="">Vše</option>
                    <option value="N">Sever</option>
                    <option value="NE">Severovýchod</option>
                    <option value="E">Východ</option>
                    <option value="SE">Jihovýchod</option>
                    <option value="S">Jih</option>
                    <option value="SW">Jihozápad</option>
                    <option value="W">Západ</option>
                    <option value="NW">Severozápad</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Terén</label>
                <select id="f-terrain">
                    <option value="">Vše</option>
                    <option value="forest">Les</option>
                    <option value="meadow">Louka</option>
                    <option value="rocky">Skalnatý terén</option>
                    <option value="mixed">Smíšený</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Zdroj vody</label>
                <select id="f-water">
                    <option value="">Vše</option>
                    <option value="500">do 500 m</option>
                    <option value="1000">do 1 km</option>
                    <option value="2000">do 2 km</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Přístřešek</label>
                <select id="f-shelter">
                    <option value="">Vše</option>
                    <option value="500">do 500 m</option>
                    <option value="1000">do 1 km</option>
                    <option value="2000">do 2 km</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Expozice větru (max)</label>
                <select id="f-wind">
                    <option value="">Vše</option>
                    <option value="1">1 – velmi chráněné</option>
                    <option value="2">2 – chráněné</option>
                    <option value="3">3 – střední</option>
                    <option value="4">4 – exponované</option>
                    <option value="5">5 – velmi exponované</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Nadm. výška (min. m)</label>
                <input type="number" id="f-elevation" placeholder="např. 800" min="0" max="2500">
            </div>
        </div>
        <div class="filter-footer">
            <button class="btn-reset" onclick="resetFilters()">Zrušit všechny filtry</button>
            <button class="btn-apply" onclick="applyFilters()">Zobrazit místa</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const MAPY_CZ_API_KEY = '{{ mapy_cz_api_key }}';
        const SPOTS_DATA = {{ spots_json|safe }};
    </script>
    <script src="{% static 'spots/js/map.js' %}"></script>

</body>
</html>
